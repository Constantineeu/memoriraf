<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Memória</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
}

/* INICIO */
#inicio {
    height: 100vh;
    background: url("img/fundo-login.jpg") no-repeat center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* JOGO */
#jogo {
    display: none;
    height: 100vh;
    background: url("img/fundo-jogo.jpg") no-repeat center/cover;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ESCURECER FUNDO */
#inicio::before, #jogo::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

#inicio *, #jogo * {
    position: relative;
    z-index: 1;
}

/* BOTÕES */
button {
    padding: 12px;
    font-size: 16px;
    margin: 8px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
}

/* TEMPO */
#tempo {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 20px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 8px;
}

/* TABULEIRO CENTRALIZADO */
#tabuleiro {
    display: grid;
    justify-content: center;
    align-content: center;
    gap: 10px;
}

/* CARTAS */
.carta {
    width: 80px;
    height: 80px;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    border-radius: 10px;
}

.carta img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* FIM */
#fim {
    display: none;
    height: 100vh;
    background: linear-gradient(45deg, #141e30, #243b55);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<div id="inicio">
    <h1>Jogo da Memória</h1>
    <button onclick="iniciar(1)">Fácil</button>
    <button onclick="iniciar(2)">Médio</button>
    <button onclick="iniciar(3)">Difícil</button>
</div>

<div id="jogo">
    <h2 id="info">Pontos: 0</h2>
    <div id="tempo"></div>
    <div id="tabuleiro"></div>
</div>

<div id="fim">
    <h1>Fim de Jogo</h1>
    <h2 id="resultado"></h2>
    <button onclick="location.reload()">Jogar Novamente</button>
</div>

<script>

const imagens = [
    "img/1.png","img/2.png","img/3.png","img/4.png","img/5.png",
    "img/6.png","img/7.png","img/8.png","img/9.png","img/10.png"
];

const niveis = {
    1: {pares: 3, tempo: 90},
    2: {pares: 7, tempo: 60},
    3: {pares: 10, tempo: 40}
};

let cartas = [];
let primeira = null;
let segunda = null;
let bloqueio = false;
let pontos = 0;
let paresEncontrados = 0;
let totalPares = 0;
let tempoRestante;
let tempoInicial;
let intervalo;

function iniciar(nivel) {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("jogo").style.display = "flex";

    pontos = 0;
    paresEncontrados = 0;

    totalPares = niveis[nivel].pares;
    tempoRestante = niveis[nivel].tempo;
    tempoInicial = tempoRestante;

    document.getElementById("info").innerText = "Pontos: 0";

    iniciarTempo();
    criarTabuleiro(totalPares);
}

function iniciarTempo() {
    atualizarTempo();
    intervalo = setInterval(() => {
        tempoRestante--;
        atualizarTempo();

        if (tempoRestante <= 0) {
            fimDeJogo(false);
        }
    }, 1000);
}

function atualizarTempo() {
    document.getElementById("tempo").innerText = "⏱ " + tempoRestante + "s";
}

function criarTabuleiro(pares) {
    const tabuleiro = document.getElementById("tabuleiro");
    tabuleiro.innerHTML = "";

    let selecionados = imagens.slice(0, pares);
    cartas = [...selecionados, ...selecionados];

    // 🔥 EMBARALHAMENTO
    cartas.sort(() => Math.random() - 0.5);

    tabuleiro.style.gridTemplateColumns =
        `repeat(${Math.ceil(Math.sqrt(cartas.length))}, 80px)`;

    cartas.forEach(img => {
        let div = document.createElement("div");
        div.classList.add("carta");
        div.dataset.valor = img;

        div.onclick = () => virarCarta(div);

        tabuleiro.appendChild(div);
    });
}

function virarCarta(carta) {
    if (bloqueio || carta.innerHTML !== "") return;

    carta.innerHTML = `<img src="${carta.dataset.valor}">`;

    if (!primeira) {
        primeira = carta;
    } else {
        segunda = carta;
        bloqueio = true;

        if (primeira.dataset.valor === segunda.dataset.valor) {
            pontos += 10;
            paresEncontrados++;
            document.getElementById("info").innerText = "Pontos: " + pontos;

            resetar();

            if (paresEncontrados === totalPares) {
                fimDeJogo(true);
            }

        } else {
            setTimeout(() => {
                primeira.innerHTML = "";
                segunda.innerHTML = "";
                resetar();
            }, 800);
        }
    }
}

function resetar() {
    primeira = null;
    segunda = null;
    bloqueio = false;
}

function fimDeJogo(venceu) {
    clearInterval(intervalo);

    document.getElementById("jogo").style.display = "none";
    document.getElementById("fim").style.display = "flex";

    if (venceu) {
        let tempoGasto = tempoInicial - tempoRestante;
        document.getElementById("resultado").innerText =
            `Pontuação: ${pontos} | Tempo: ${tempoGasto}s`;
    } else {
        document.getElementById("resultado").innerText =
            `Tempo acabou! Pontuação: ${pontos}`;
    }
}

</script>

</body>
</html>

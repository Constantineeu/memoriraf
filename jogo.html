<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Memória</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
}

/* Tela inicial */
#inicio {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1511512578047-dfb367046420') no-repeat center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

button {
    padding: 15px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
}

/* Tela do jogo */
#jogo {
    display: none;
    min-height: 100vh;
    background: url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d1') no-repeat center/cover;
}

#tabuleiro {
    display: grid;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.carta {
    width: 80px;
    height: 80px;
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    cursor: pointer;
}

.virada {
    background: white;
    color: black;
}

</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="inicio">
    <h1>Jogo da Memória</h1>
    <button onclick="iniciar(1)">Nível 1 (3 pares)</button>
    <button onclick="iniciar(2)">Nível 2 (7 pares)</button>
    <button onclick="iniciar(3)">Nível 3 (10 pares)</button>
</div>

<!-- TELA DO JOGO -->
<div id="jogo">
    <h2 id="info"></h2>
    <h3 id="tempo"></h3>
    <div id="tabuleiro"></div>
</div>

<script>

let cartas = [];
let primeira = null;
let segunda = null;
let bloqueio = false;
let pontos = 0;
let paresEncontrados = 0;
let totalPares = 0;
let tempoRestante;
let intervalo;

// EMOJIS DAS CARTAS
const emojis = ["🍎","🍌","🍇","🍓","🍉","🍒","🥝","🍍","🥥","🍑"];

// CONFIG DOS NÍVEIS
const niveis = {
    1: {pares: 3, tempo: 90},
    2: {pares: 7, tempo: 60},
    3: {pares: 10, tempo: 40}
};

function iniciar(nivel) {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("jogo").style.display = "block";

    pontos = 0;
    paresEncontrados = 0;

    totalPares = niveis[nivel].pares;
    tempoRestante = niveis[nivel].tempo;

    document.getElementById("info").innerText = "Pontos: 0";

    iniciarTempo();
    criarTabuleiro(totalPares);
}

function iniciarTempo() {
    atualizarTempo();
    intervalo = setInterval(() => {
        tempoRestante--;
        atualizarTempo();

        if (tempoRestante <= 0) {
            fimDeJogo();
        }
    }, 1000);
}

function atualizarTempo() {
    document.getElementById("tempo").innerText = "Tempo: " + tempoRestante + "s";
}

function criarTabuleiro(pares) {
    const tabuleiro = document.getElementById("tabuleiro");
    tabuleiro.innerHTML = "";

    cartas = [];
    let selecionados = emojis.slice(0, pares);

    cartas = [...selecionados, ...selecionados];
    cartas.sort(() => Math.random() - 0.5);

    tabuleiro.style.gridTemplateColumns = `repeat(${Math.ceil(Math.sqrt(cartas.length))}, 80px)`;

    cartas.forEach((emoji, index) => {
        let div = document.createElement("div");
        div.classList.add("carta");
        div.dataset.valor = emoji;

        div.onclick = () => virarCarta(div);

        tabuleiro.appendChild(div);
    });
}

function virarCarta(carta) {
    if (bloqueio || carta.classList.contains("virada")) return;

    carta.innerText = carta.dataset.valor;
    carta.classList.add("virada");

    if (!primeira) {
        primeira = carta;
    } else {
        segunda = carta;
        bloqueio = true;

        if (primeira.dataset.valor === segunda.dataset.valor) {
            pontos += 10;
            paresEncontrados++;
            document.getElementById("info").innerText = "Pontos: " + pontos;

            resetar();

            if (paresEncontrados === totalPares) {
                fimDeJogo();
            }

        } else {
            setTimeout(() => {
                primeira.innerText = "";
                segunda.innerText = "";
                primeira.classList.remove("virada");
                segunda.classList.remove("virada");
                resetar();
            }, 800);
        }
    }
}

function resetar() {
    primeira = null;
    segunda = null;
    bloqueio = false;
}

function fimDeJogo() {
    clearInterval(intervalo);
    alert("Fim de jogo! Pontuação: " + pontos);
    location.reload();
}

</script>

</body>
</html>
